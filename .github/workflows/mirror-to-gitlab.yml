name: Mirror to GitLab

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    name: Push to GitLab
    runs-on: ubuntu-latest
    if: github.repository == 'ItzTas/luadot'
    env:
      GITLAB_REPO: gitlab.digitalventura.com.br/luadot/luadot.git
    steps:
      - name: Diagnose GitLab access
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          echo "token length: ${#GITLAB_TOKEN}"
          base="https://gitlab.digitalventura.com.br/api/v4"
          curl -s -o /dev/null -w "user    -> %{http_code}\n" --header "PRIVATE-TOKEN: $GITLAB_TOKEN" "$base/user"
          curl -s -o /dev/null -w "project -> %{http_code}\n" --header "PRIVATE-TOKEN: $GITLAB_TOKEN" "$base/projects/luadot%2Fluadot"
          curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" "$base/projects/luadot%2Fluadot" | tr ',' '\n' | grep -iE 'path_with_namespace|access_level' || true

      - name: Mirror to GitLab
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::$GITLAB_TOKEN"
          git clone --mirror "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" repo.git
          git -C repo.git push --mirror "https://oauth2:${GITLAB_TOKEN}@${GITLAB_REPO}"
