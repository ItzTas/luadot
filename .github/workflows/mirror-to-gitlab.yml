name: Mirror to GitLab

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    name: Push to GitLab
    runs-on: ubuntu-latest
    if: github.repository == 'ItzTas/luadot'
    env:
      GITLAB_REPO: gitlab.digitalventura.com.br/luadot/luadot.git
    steps:
      - name: Clone GitHub repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --mirror "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" repo.git

      - name: Push to GitLab
        uses: nick-fields/retry@v3
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 60
          command: |
            set -euo pipefail
            git -C repo.git push --force --all "https://oauth2:${GITLAB_TOKEN}@${GITLAB_REPO}"
            git -C repo.git push --force --tags "https://oauth2:${GITLAB_TOKEN}@${GITLAB_REPO}"
